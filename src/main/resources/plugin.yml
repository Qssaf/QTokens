name: QTokens
description: $description
prefix: QTokens
version: '${version}'
main: dev.parrotstudios.qTokens.QTokens
api-version: '1.21.11'
load: POSTWORLD
authors: [ Qssaf ]
softdepend: ["PlaceholderAPI"]
commands:
  qtokens:
    aliases:
      - Qtokens
      - tokens
    description: Main command for the plugin
    permission: qtokens.use
permissions:
  qtoken.use:
    default: op
  qtoken.use.reload:
    default: op
  qtokens.use.balance:
    default: op
  qtokens.use.balance.others:
    default: op
  qtokens.use.take:
    default: op
  qtokens.use.give:
    default: op